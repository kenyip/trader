signal_bounds:
  iv_rank:
    min: 30.0
entry:
  entry_signal_lag_bars: 1
  entry_ema_stack_min: 0.0
management:
  long_dte: 21
  long_target_delta: 0.18
  spread_width: 1.0
  min_credit_pct: 0.1
  profit_target: 0.5
  defined_loss_exit_frac: 0.7
  delta_breach: 0.4
  dte_stop: 7
  regime_flip_exit_enabled: true
  iv_rank_min: 30.0
  max_loss_budget_usd: 300.0
structure_defaults: {}
max_structures: 1
discovery_gates:
  min_trades: 8
  max_loss_usd: 300.0
  max_dd_discovery_usd: 150.0
  require_integrity: true
  require_positive_pnl: true
  require_control_beat: true
notes: >
  Proxy L0 seed. Survives only if dual-cost holdout still clears;
  unit tests must not hard-code this as eternal edge.
